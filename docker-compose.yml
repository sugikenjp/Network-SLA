# docker-compose.yml - Network-SLA team01 用設定
# =================================================
# 概要:
#   SLAチェック（cron）と WEBコンソール（Flask）が一体になったコンテナを起動する。
#   2チーム目以降はこのディレクトリをコピーして TEAM_NAME 等を変更して起動する。
#
# 起動:   docker compose up -d
# 停止:   docker compose down
# ログ:   docker compose logs -f
# 再起動: docker compose restart

services:
  network-sla-team01:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: network-sla-team01

    environment:
      # チーム名: param.py の team_name と必ず一致させること
      - TEAM_NAME=team01

      # WEBコンソールのポート（デフォルト: 5000）
      - PORT=5000

      # cron 実行間隔（省略時は Dockerfile の crontab 設定: */5 * * * *）
      # 変更例: 10分ごと → CRON_SCHEDULE=*/10 * * * *
      # - CRON_SCHEDULE=*/5 * * * *

      # ログディレクトリ（コンテナ内パス）
      - LOG_DIR=/var/log/sla

    ports:
      # WEBコンソールのポートをホストに公開
      # 2チーム目は別ポートを使用: "5001:5000"
      - "5000:5000"

    volumes:
      # param.py: ホスト側を編集するだけでコンテナ再ビルドなしに設定変更できる
      - ./param.py:/app/param.py

      # config/: WEBコンソールの設定JSONを永続化する
      - ./config:/app/config

      # logs/: SLAチェックのログをホスト側で参照できる
      - ./logs:/var/log/sla

    # ホストネットワーク使用時は ports の設定が無効になる点に注意。
    # ping の到達性が必要な場合は network_mode: host を有効にする。
    # ※ Linux のみ対応。Mac/Windows では使用しないこと。
    # network_mode: host

    restart: always

    healthcheck:
      test: ["CMD", "pgrep", "-f", "python3"]
      interval: 60s
      timeout: 5s
      retries: 3

# ──────────────────────────────────────────────────
# 2チーム目を追加する場合:
#   cp -r . ../network-sla-team02
#   cd ../network-sla-team02
#   # param.py の team_name と各IPを変更
#   # docker-compose.yml の TEAM_NAME と ports を変更
#   #   - TEAM_NAME=team02
#   #   - "5001:5000"  ← ポートを変える
#   docker compose up -d
# ──────────────────────────────────────────────────
